<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X(Twitter) ユーザー名抽出ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ユーザー名 抽出ツール</h1>
        <p class="description">テキストを貼り付けると「@」から始まるユーザー名を一括抽出します。</p>
        
        <textarea id="inputText" placeholder="ここに複数の自己紹介テキストなどを貼り付けてください..."></textarea>
        <button id="extractBtn">ユーザー名を抽出する</button>
        
        <div id="resultArea"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
